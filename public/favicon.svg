<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Primebrick Astro website favicon: 2x2 brick grid, cyan -> violet gradient.
       TL=cyan #06b6d4, BR=violet #7c3aed, TR/BL interpolated stops.
       Distinct from FE (sky->indigo) and Docs (grey->black). -->
  <rect x="4"  y="4"  width="26" height="26" rx="5" fill="#06b6d4"/>
  <rect x="34" y="4"  width="26" height="26" rx="5" fill="#3a8bc4"/>
  <rect x="4"  y="34" width="26" height="26" rx="5" fill="#6a60b4"/>
  <rect x="34" y="34" width="26" height="26" rx="5" fill="#7c3aed"/>
  <circle cx="17" cy="17" r="4" fill="#ffffff"/>
</svg>
